<form method="POST">
    {{ form.hidden_tag() }}
    <input type="hidden" name="form_type" value="personal">

    <div class="mb-3">
        {{ form.title.label(class="form-label fw-medium") }}
        {{ form.title(class="form-control") }}
    </div>

    <div class="row">
        <div class="col-md-6 mb-3">
            {{ form.type.label(class="form-label fw-medium") }}
            {{ form.type(class="form-select") }}
        </div>
        <div class="col-md-6 mb-3">
            {{ form.year.label(class="form-label fw-medium") }}
            {{ form.year(class="form-control") }}
        </div>
    </div>

    <button type="submit" class="btn btn-gold w-100 py-2">Save Personal Award</button>
</form>
