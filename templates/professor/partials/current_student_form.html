<form method="POST" action="/professor/scholarship/edit/current_student/{{ id }}">
    {{ form.hidden_tag() }}
    <div class="mb-3">
        <label class="form-label">Student Name</label>
        {{ form.student_name(class="form-control") }}
    </div>
    <div class="mb-3">
        <label class="form-label">Current Program</label>
        {{ form.current_program(class="form-select") }}
    </div>
    <div class="mb-3">
        <label class="form-label">Start Date</label>
        {{ form.start_date(class="form-control") }}
    </div>
    <button type="submit" class="btn btn-gold">Save Student</button>
</form>
