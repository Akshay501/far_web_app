<form method="POST">
    {{ form.hidden_tag() }}
    <div class="mb-3">{{ form.description.label }} {{ form.description(class="form-control") }}</div>
    <div class="row">
        <div class="col-md-6">{{ form.type.label }} {{ form.type(class="form-select") }}</div>
        <div class="col-md-6">{{ form.term.label }} {{ form.term(class="form-select") }}</div>
    </div>
    <button type="submit" class="btn btn-gold mt-3">Save Changes</button>
</form>
